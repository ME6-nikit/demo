<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Timer</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #131c2e;
      --panel-2: #1a2640;
      --text: #eef3ff;
      --muted: #a8b2cc;
      --accent: #66b2ff;
      --start: #22c55e;
      --stop: #ef4444;
      --track: #8b5cf6;
      --reset: #f59e0b;
      --fastest: #22c55e;
      --slowest: #ef4444;
      --ring: #93c5fd;
      --border: rgba(255, 255, 255, 0.12);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #13203a 0%, var(--bg) 60%);
      color: var(--text);
      padding: 1rem;
      display: grid;
      place-items: center;
    }

    .timer-card {
      width: min(720px, 100%);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: clamp(1.2rem, 2.8vw, 1.6rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .display {
      margin: 0;
      font-variant-numeric: tabular-nums;
      font-size: clamp(2.6rem, 10vw, 5rem);
      font-weight: 800;
      text-align: center;
      line-height: 1.05;
      padding: 0.8rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) - 4px);
      background: rgba(0, 0, 0, 0.22);
      letter-spacing: 0.03em;
    }

    .controls {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.6rem;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 0.72rem 0.6rem;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.15s ease, opacity 0.2s ease;
    }

    button:hover:enabled {
      filter: brightness(1.08);
    }

    button:active:enabled {
      transform: translateY(1px) scale(0.99);
    }

    button:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #startBtn { background: var(--start); }
    #stopBtn { background: var(--stop); }
    #trackBtn { background: var(--track); }
    #resetBtn { background: var(--reset); }

    .tracks-header {
      margin-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
    }

    .tracks-header h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    #trackCount {
      color: var(--muted);
      font-size: 0.9rem;
    }

    #tracksList {
      margin: 0.7rem 0 0;
      padding: 0;
      list-style: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      max-height: min(48vh, 420px);
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 1.1rem;
    }

    .track-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem 1rem;
      align-items: center;
      padding: 0.78rem 0.9rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-variant-numeric: tabular-nums;
    }

    .track-item:last-child {
      border-bottom: none;
    }

    .track-label {
      font-weight: 700;
    }

    .track-time {
      font-weight: 800;
      color: var(--accent);
      font-size: 1.05rem;
    }

    .badges {
      display: flex;
      gap: 0.35rem;
      grid-column: 1 / -1;
      flex-wrap: wrap;
    }

    .badge {
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .track-item.fastest {
      background: rgba(34, 197, 94, 0.16);
      border-left: 4px solid var(--fastest);
      padding-left: 0.66rem;
    }

    .track-item.slowest {
      box-shadow: inset 0 0 0 999px rgba(239, 68, 68, 0.12);
    }

    .badge-fastest {
      background: rgba(34, 197, 94, 0.18);
      color: #b8facc;
      border: 1px solid rgba(34, 197, 94, 0.45);
    }

    .badge-slowest {
      background: rgba(239, 68, 68, 0.18);
      color: #ffd0d0;
      border: 1px solid rgba(239, 68, 68, 0.45);
    }

    @media (max-width: 620px) {
      .timer-card {
        padding: 1rem;
      }

      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="timer-card">
    <h1>Track Timer</h1>
    <p class="subtitle">Start the timer, record each segment as a track, then compare fastest and slowest.</p>

    <p id="timeDisplay" class="display" aria-live="polite">00:00.00</p>

    <div class="controls">
      <button id="startBtn" type="button">Start</button>
      <button id="stopBtn" type="button" disabled>Stop</button>
      <button id="trackBtn" type="button" disabled>Track</button>
      <button id="resetBtn" type="button">Reset</button>
    </div>

    <section aria-labelledby="tracksTitle">
      <div class="tracks-header">
        <h2 id="tracksTitle">Recorded Tracks</h2>
        <span id="trackCount">0 tracks</span>
      </div>
      <ul id="tracksList">
        <li class="empty">No tracks yet. Press Start and then Track to record segments.</li>
      </ul>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      var state = {
        running: false,
        startStamp: 0,
        elapsedBeforeStart: 0,
        tracks: [],
        lastTrackElapsed: 0,
        rafId: 0
      };

      var timeDisplay = document.getElementById("timeDisplay");
      var startBtn = document.getElementById("startBtn");
      var stopBtn = document.getElementById("stopBtn");
      var trackBtn = document.getElementById("trackBtn");
      var resetBtn = document.getElementById("resetBtn");
      var tracksList = document.getElementById("tracksList");
      var trackCount = document.getElementById("trackCount");
      var lastRenderedCentisecond = -1;

      function pad2(value) {
        return String(value).padStart(2, "0");
      }

      function formatTime(ms) {
        var safeMs = Math.max(0, Number.isFinite(ms) ? ms : 0);
        var minutes = Math.floor(safeMs / 60000);
        var seconds = Math.floor((safeMs % 60000) / 1000);
        var centiseconds = Math.floor((safeMs % 1000) / 10);
        return pad2(minutes) + ":" + pad2(seconds) + "." + pad2(centiseconds);
      }

      function elapsedMs() {
        if (!state.running) {
          return state.elapsedBeforeStart;
        }
        return state.elapsedBeforeStart + (performance.now() - state.startStamp);
      }

      function renderDisplay(force) {
        var ms = elapsedMs();
        var currentCentisecond = Math.floor(ms / 10);
        if (!force && currentCentisecond === lastRenderedCentisecond) {
          return;
        }
        lastRenderedCentisecond = currentCentisecond;
        timeDisplay.textContent = formatTime(ms);
      }

      function syncControls() {
        startBtn.disabled = state.running;
        stopBtn.disabled = !state.running;
        trackBtn.disabled = !state.running;
      }

      function tick() {
        renderDisplay(false);
        state.rafId = requestAnimationFrame(tick);
      }

      function startTimer() {
        if (state.running) {
          return;
        }
        state.running = true;
        state.startStamp = performance.now();
        syncControls();
        state.rafId = requestAnimationFrame(tick);
      }

      function stopTimer() {
        if (!state.running) {
          return;
        }
        state.elapsedBeforeStart = elapsedMs();
        state.running = false;
        cancelAnimationFrame(state.rafId);
        state.rafId = 0;
        syncControls();
        renderDisplay(true);
      }

      function resetTimer() {
        stopTimer();
        state.elapsedBeforeStart = 0;
        state.lastTrackElapsed = 0;
        state.tracks = [];
        lastRenderedCentisecond = -1;
        renderDisplay(true);
        renderTracks();
      }

      function recordTrack() {
        if (!state.running) {
          return;
        }

        var totalNow = elapsedMs();
        var segment = Math.max(0, totalNow - state.lastTrackElapsed);
        state.lastTrackElapsed = totalNow;
        state.tracks.push(segment);
        renderTracks();
      }

      function createBadge(className, text) {
        var badge = document.createElement("span");
        badge.className = "badge " + className;
        badge.textContent = text;
        return badge;
      }

      function renderTracks() {
        var tracks = state.tracks;
        tracksList.innerHTML = "";
        trackCount.textContent = tracks.length + (tracks.length === 1 ? " track" : " tracks");

        if (tracks.length === 0) {
          var emptyItem = document.createElement("li");
          emptyItem.className = "empty";
          emptyItem.textContent = "No tracks yet. Press Start and then Track to record segments.";
          tracksList.appendChild(emptyItem);
          return;
        }

        var fastest = Math.min.apply(null, tracks);
        var slowest = Math.max.apply(null, tracks);

        tracks.forEach(function (trackMs, index) {
          var li = document.createElement("li");
          li.className = "track-item";

          var isFastest = trackMs === fastest;
          var isSlowest = trackMs === slowest;

          if (isFastest) {
            li.classList.add("fastest");
          }
          if (isSlowest) {
            li.classList.add("slowest");
          }

          var label = document.createElement("span");
          label.className = "track-label";
          label.textContent = "Track " + (index + 1);

          var time = document.createElement("span");
          time.className = "track-time";
          time.textContent = formatTime(trackMs);

          li.appendChild(label);
          li.appendChild(time);

          if (isFastest || isSlowest) {
            var badges = document.createElement("div");
            badges.className = "badges";
            if (isFastest) {
              badges.appendChild(createBadge("badge-fastest", "Fastest"));
            }
            if (isSlowest) {
              badges.appendChild(createBadge("badge-slowest", "Slowest"));
            }
            li.appendChild(badges);
          }

          tracksList.appendChild(li);
        });
      }

      startBtn.addEventListener("click", startTimer);
      stopBtn.addEventListener("click", stopTimer);
      trackBtn.addEventListener("click", recordTrack);
      resetBtn.addEventListener("click", resetTimer);

      syncControls();
      renderDisplay(true);
      renderTracks();
    })();
  </script>
</body>
</html>
