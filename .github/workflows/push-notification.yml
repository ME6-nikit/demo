name: Push Notification

on:
  push:

jobs:
  notify:
    name: Send push notification
    runs-on: ubuntu-latest
    steps:
      - name: Send webhook notification
        env:
          WEBHOOK_URL: ${{ secrets.PUSH_NOTIFICATION_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          ACTOR: ${{ github.actor }}
          PUSHED_AT: ${{ github.event.head_commit.timestamp }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "PUSH_NOTIFICATION_WEBHOOK_URL is not set. Skipping notification."
            exit 0
          fi

          payload=$(python3 - <<'PY'
          import json
          import os

          payload = {
              "text": f"New push in {os.environ['REPOSITORY']}",
              "repository": os.environ["REPOSITORY"],
              "branch": os.environ["BRANCH"],
              "commitSha": os.environ["COMMIT_SHA"],
              "commitMessage": os.environ.get("COMMIT_MESSAGE", ""),
              "commitUrl": os.environ.get("COMMIT_URL", ""),
              "actor": os.environ["ACTOR"],
              "pushedAt": os.environ.get("PUSHED_AT", ""),
          }
          print(json.dumps(payload))
          PY
          )

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$WEBHOOK_URL"
